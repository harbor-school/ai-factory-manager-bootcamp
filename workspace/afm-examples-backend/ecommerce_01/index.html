<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쿡웨어 스튜디오 — Cookware Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://js.tosspayments.com/v1/payment-widget"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#F5F0EB',
            wood: '#D4A574',
            'wood-dark': '#8B6914',
            'brown-dark': '#3D2B1F',
            'brown-sub': '#7A6B5D',
            'cat-knife': '#C17817',
            'cat-pot': '#8B6914',
            'cat-acc': '#A0522D',
          }
        }
      }
    };
  </script>
  <style>
    body { background-color: #F5F0EB; color: #3D2B1F; font-family: system-ui, -apple-system, sans-serif; }
    .skeleton-pulse { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-16px); } }
    .toast-enter { animation: slideDown 0.3s ease-out forwards; }
    .toast-exit { animation: slideUp 0.3s ease-in forwards; }
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(61,43,31,0.12); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 1. React Hooks Destructuring
    // ========================================
    const {
      useState, useEffect, useContext, useCallback,
      useMemo, useRef, createContext
    } = React;

    // ========================================
    // 2. Constants & Utilities
    // ========================================
    const API_BASE_URL = '/api';

    const CATEGORIES = ['전체', '칼/도마류', '냄비/팬류', '주방소품류'];

    const CATEGORY_COLORS = {
      '칼/도마류': { bg: 'bg-cat-knife', text: 'text-white' },
      '냄비/팬류': { bg: 'bg-cat-pot', text: 'text-white' },
      '주방소품류': { bg: 'bg-cat-acc', text: 'text-white' },
    };

    function formatPrice(price) {
      if (price == null) return '';
      return Number(price).toLocaleString('ko-KR') + '원';
    }

    function getToken() {
      return localStorage.getItem('ecommerce_token');
    }

    function getUser() {
      try {
        const raw = localStorage.getItem('ecommerce_user');
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveAuth(token, user) {
      localStorage.setItem('ecommerce_token', token);
      localStorage.setItem('ecommerce_user', JSON.stringify(user));
    }

    function clearAuth() {
      localStorage.removeItem('ecommerce_token');
      localStorage.removeItem('ecommerce_user');
    }

    async function apiFetch(endpoint, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers });
      const data = await res.json();
      return data;
    }

    // ========================================
    // 3. Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', type = 'button', ...rest }) {
      const baseStyles = 'inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-wood text-white hover:bg-wood-dark focus:ring-wood',
        secondary: 'bg-white text-brown-dark border border-gray-300 hover:bg-gray-50 focus:ring-gray-300',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost: 'bg-transparent text-brown-sub hover:bg-cream focus:ring-wood',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          className={`${baseStyles} ${variants[variant]} ${sizes[size]} ${className}`}
          disabled={disabled}
          onClick={onClick}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <div className={`w-full ${className}`}>
          {label && <label className="block text-sm font-medium text-brown-dark mb-1">{label}</label>}
          <input
            className={`w-full px-4 py-2.5 rounded-lg border ${error ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-wood'} focus:outline-none focus:ring-2 focus:ring-offset-1 bg-white text-brown-dark placeholder-brown-sub/50 transition-colors`}
            {...props}
          />
          {error && <p className="mt-1 text-sm text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '', onClick }) {
      return (
        <div
          className={`bg-white rounded-xl shadow-sm overflow-hidden ${onClick ? 'cursor-pointer card-hover' : ''} ${className}`}
          onClick={onClick}
        >
          {children}
        </div>
      );
    }

    function Badge({ children, color = 'wood', className = '' }) {
      const colorMap = {
        wood: 'bg-wood text-white',
        knife: 'bg-cat-knife text-white',
        pot: 'bg-cat-pot text-white',
        acc: 'bg-cat-acc text-white',
      };
      return (
        <span className={`inline-block px-2 py-0.5 text-xs font-medium rounded-full ${colorMap[color] || colorMap.wood} ${className}`}>
          {children}
        </span>
      );
    }

    function CategoryBadge({ category }) {
      const colorMap = {
        '칼/도마류': 'knife',
        '냄비/팬류': 'pot',
        '주방소품류': 'acc',
      };
      return <Badge color={colorMap[category] || 'wood'}>{category}</Badge>;
    }

    function Spinner({ size = 'md', className = '' }) {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className={`${sizes[size]} border-2 border-wood/20 border-t-wood rounded-full animate-spin ${className}`} role="status">
          <span className="sr-only">로딩 중...</span>
        </div>
      );
    }

    function SkeletonCard() {
      return (
        <div className="bg-white rounded-xl shadow-sm overflow-hidden">
          <div className="aspect-square bg-gray-200 skeleton-pulse" />
          <div className="p-3">
            <div className="h-4 w-16 bg-gray-200 rounded-full skeleton-pulse mb-2" />
            <div className="h-5 w-3/4 bg-gray-200 rounded skeleton-pulse mb-2" />
            <div className="h-5 w-1/2 bg-gray-200 rounded skeleton-pulse" />
          </div>
        </div>
      );
    }

    function EmptyState({ icon = '🍳', title, description }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 text-center">
          <span className="text-5xl mb-4">{icon}</span>
          <h3 className="text-lg font-semibold text-brown-dark mb-1">{title}</h3>
          {description && <p className="text-sm text-brown-sub">{description}</p>}
        </div>
      );
    }

    // ========================================
    // 4. Toast System
    // ========================================
    const ToastContext = createContext();

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const idRef = useRef(0);

      const addToast = useCallback((message, type = 'info') => {
        const id = ++idRef.current;
        setToasts(prev => [...prev, { id, message, type, exiting: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
          }, 300);
        }, 2000);
      }, []);

      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 pointer-events-none">
            {toasts.map(t => {
              const bgMap = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
              return (
                <div
                  key={t.id}
                  className={`${bgMap[t.type] || bgMap.info} text-white px-5 py-2.5 rounded-lg shadow-lg text-sm font-medium ${t.exiting ? 'toast-exit' : 'toast-enter'}`}
                >
                  {t.message}
                </div>
              );
            })}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() {
      return useContext(ToastContext);
    }

    // ========================================
    // 5. Auth Context
    // ========================================
    const AuthContext = createContext();

    function AuthProvider({ children }) {
      const [user, setUser] = useState(() => getUser());
      const [token, setToken] = useState(() => getToken());

      const login = useCallback((newToken, newUser) => {
        saveAuth(newToken, newUser);
        setToken(newToken);
        setUser(newUser);
      }, []);

      const logout = useCallback(() => {
        clearAuth();
        setToken(null);
        setUser(null);
      }, []);

      const value = useMemo(() => ({ user, token, login, logout, isLoggedIn: !!token }), [user, token, login, logout]);

      return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    // ========================================
    // 6. Router
    // ========================================
    const RouterContext = createContext();

    function matchRoute(pattern, path) {
      const patternParts = pattern.split('/').filter(Boolean);
      const pathParts = path.split('/').filter(Boolean);
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = decodeURIComponent(pathParts[i]);
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    }

    function Router({ children }) {
      const [path, setPath] = useState(() => window.location.hash.slice(1) || '/');

      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const navigate = useCallback((to) => {
        window.location.hash = to;
      }, []);

      const value = useMemo(() => ({ path, navigate }), [path, navigate]);

      return <RouterContext.Provider value={value}>{children}</RouterContext.Provider>;
    }

    function useRouter() {
      return useContext(RouterContext);
    }

    function Routes({ children }) {
      const { path } = useRouter();
      const routes = React.Children.toArray(children);

      for (const route of routes) {
        const params = matchRoute(route.props.path, path);
        if (params !== null) {
          return React.cloneElement(route, { params });
        }
      }
      // Fallback: try root match
      for (const route of routes) {
        if (route.props.path === '/') {
          return React.cloneElement(route, { params: {} });
        }
      }
      return null;
    }

    function Route({ path, element, params }) {
      if (typeof element === 'function') {
        const Element = element;
        return <Element params={params} />;
      }
      return React.cloneElement(element, { params });
    }

    function Link({ to, children, className = '', ...rest }) {
      const { navigate } = useRouter();
      const handleClick = (e) => {
        e.preventDefault();
        navigate(to);
      };
      return (
        <a href={`#${to}`} onClick={handleClick} className={className} {...rest}>
          {children}
        </a>
      );
    }

    // ========================================
    // 7. Layout Components
    // ========================================
    function Header() {
      const { isLoggedIn, user, logout } = useAuth();
      const { navigate } = useRouter();
      const { addToast } = useToast();
      const [cartCount, setCartCount] = useState(0);

      useEffect(() => {
        if (isLoggedIn) {
          apiFetch('/cart/count').then(res => {
            if (res.success) setCartCount(res.data.count);
          }).catch(() => {});
        } else {
          setCartCount(0);
        }
      }, [isLoggedIn]);

      useEffect(() => {
        const handler = () => {
          if (isLoggedIn) {
            apiFetch('/cart/count').then(res => {
              if (res.success) setCartCount(res.data.count);
            }).catch(() => {});
          }
        };
        window.addEventListener('cart-updated', handler);
        return () => window.removeEventListener('cart-updated', handler);
      }, [isLoggedIn]);

      const handleLogout = () => {
        logout();
        addToast('로그아웃되었습니다', 'info');
        navigate('/');
      };

      return (
        <header className="sticky top-0 z-40 bg-white shadow-sm">
          <div className="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
            <Link to="/" className="text-lg font-bold text-brown-dark hover:text-wood-dark transition-colors">
              쿡웨어 스튜디오
            </Link>
            <div className="flex items-center gap-3">
              {isLoggedIn ? (
                <>
                  <Link to="/orders" className="text-sm text-brown-sub hover:text-brown-dark transition-colors hidden sm:inline">주문내역</Link>
                  <Link to="/cart" className="relative p-1">
                    <svg className="w-6 h-6 text-brown-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                    </svg>
                    {cartCount > 0 && (
                      <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full font-bold">
                        {cartCount > 99 ? '99+' : cartCount}
                      </span>
                    )}
                  </Link>
                  <span className="text-sm text-brown-sub hidden sm:inline">{user?.name}님</span>
                  <Button variant="ghost" size="sm" onClick={handleLogout}>로그아웃</Button>
                </>
              ) : (
                <Link to="/login">
                  <Button variant="ghost" size="sm">로그인</Button>
                </Link>
              )}
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // 8. Page: Home (Product List)
    // ========================================
    function HomePage() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedCategory, setSelectedCategory] = useState('전체');
      const { navigate } = useRouter();

      const fetchProducts = useCallback(async (category) => {
        setLoading(true);
        setError(null);
        try {
          const query = category && category !== '전체' ? `?category=${encodeURIComponent(category)}` : '';
          const res = await apiFetch(`/products${query}`);
          if (res.success) {
            setProducts(res.data || []);
          } else {
            setError(res.message || '상품을 불러올 수 없습니다');
          }
        } catch (err) {
          setError('서버 연결에 실패했습니다');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchProducts(selectedCategory);
      }, [selectedCategory, fetchProducts]);

      const handleCategoryChange = (cat) => {
        setSelectedCategory(cat);
      };

      return (
        <div>
          {/* Hero Banner */}
          <section className="relative overflow-hidden" style={{ background: 'linear-gradient(135deg, #F5F0EB 0%, #D4A574 50%, #8B6914 100%)' }}>
            <div className="max-w-5xl mx-auto px-4 py-12 sm:py-16 relative z-10">
              <h1 className="text-2xl sm:text-3xl lg:text-4xl font-bold text-white leading-tight mb-3" style={{ textShadow: '0 2px 8px rgba(61,43,31,0.3)' }}>
                당신의 주방을 완성하는<br/>프리미엄 도구
              </h1>
              <p className="text-sm sm:text-base text-white/80" style={{ textShadow: '0 1px 4px rgba(61,43,31,0.2)' }}>
                쿡웨어 스튜디오에서 엄선한 주방용품을 만나보세요
              </p>
            </div>
            <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 80% 50%, white 0%, transparent 50%)' }} />
          </section>

          <div className="max-w-5xl mx-auto px-4 py-6">
            {/* Category Filter Tabs */}
            <div className="flex gap-2 overflow-x-auto pb-2 mb-6 scrollbar-hide">
              {CATEGORIES.map(cat => (
                <button
                  key={cat}
                  onClick={() => handleCategoryChange(cat)}
                  className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 ${
                    selectedCategory === cat
                      ? 'bg-wood text-white shadow-sm'
                      : 'bg-transparent text-brown-sub border border-gray-300 hover:border-wood hover:text-wood'
                  }`}
                >
                  {cat}
                </button>
              ))}
            </div>

            {/* Product Grid */}
            {loading ? (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {Array.from({ length: 8 }).map((_, i) => <SkeletonCard key={i} />)}
              </div>
            ) : error ? (
              <EmptyState icon="⚠️" title="오류가 발생했습니다" description={error} />
            ) : products.length === 0 ? (
              <EmptyState icon="🍳" title="상품이 없습니다" description="해당 카테고리에 등록된 상품이 없습니다" />
            ) : (
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {products.map(product => (
                  <ProductCard key={product.id} product={product} onClick={() => navigate(`/product/${product.id}`)} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function ProductCard({ product, onClick }) {
      return (
        <Card onClick={onClick}>
          <div className="aspect-square bg-gray-100 overflow-hidden">
            {product.image_url ? (
              <img
                src={product.image_url}
                alt={product.name}
                className="w-full h-full object-cover"
                loading="lazy"
                onError={(e) => {
                  e.target.style.display = 'none';
                  e.target.nextSibling && (e.target.nextSibling.style.display = 'flex');
                }}
              />
            ) : null}
            <div className={`w-full h-full ${product.image_url ? 'hidden' : 'flex'} items-center justify-center text-4xl bg-cream`}>
              {product.category === '칼/도마류' ? '🔪' : product.category === '냄비/팬류' ? '🍳' : '🥄'}
            </div>
          </div>
          <div className="p-3">
            <CategoryBadge category={product.category} />
            <h3 className="mt-1.5 text-sm font-semibold text-brown-dark truncate">{product.name}</h3>
            <p className="mt-1 text-sm font-bold text-wood-dark">{formatPrice(product.price)}</p>
          </div>
        </Card>
      );
    }

    // ========================================
    // 9. Page: Product Detail
    // ========================================
    function ProductDetailPage({ params }) {
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const { navigate } = useRouter();
      const { addToast } = useToast();
      const { isLoggedIn } = useAuth();

      useEffect(() => {
        if (!params?.id) return;
        setLoading(true);
        apiFetch(`/products/${params.id}`)
          .then(res => {
            if (res.success) {
              setProduct(res.data);
            } else {
              setError(res.message || '상품을 찾을 수 없습니다');
            }
          })
          .catch(() => setError('서버 연결에 실패했습니다'))
          .finally(() => setLoading(false));
      }, [params?.id]);

      const handleAddToCart = async () => {
        if (!isLoggedIn) {
          addToast('로그인 후 이용해주세요', 'info');
          navigate('/login');
          return;
        }
        try {
          const res = await apiFetch('/cart', {
            method: 'POST',
            body: JSON.stringify({ product_id: product.id, quantity: 1 }),
          });
          if (res.success) {
            addToast('장바구니에 담았습니다', 'success');
            window.dispatchEvent(new Event('cart-updated'));
          } else {
            addToast(res.message || '장바구니 추가 실패', 'error');
          }
        } catch {
          addToast('서버 연결에 실패했습니다', 'error');
        }
      };

      if (loading) {
        return (
          <div className="max-w-5xl mx-auto px-4 py-8 flex justify-center">
            <Spinner size="lg" />
          </div>
        );
      }

      if (error || !product) {
        return (
          <div className="max-w-5xl mx-auto px-4 py-8">
            <EmptyState icon="😢" title="상품을 찾을 수 없습니다" description={error} />
            <div className="text-center mt-4">
              <Button variant="secondary" onClick={() => navigate('/')}>목록으로 돌아가기</Button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-5xl mx-auto px-4 py-6">
          {/* Back Button */}
          <button
            onClick={() => navigate('/')}
            className="flex items-center gap-1 text-brown-sub hover:text-brown-dark transition-colors mb-6 text-sm"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            목록으로
          </button>

          <div className="flex flex-col lg:flex-row gap-8">
            {/* Product Image */}
            <div className="lg:w-1/2 flex-shrink-0">
              <div className="aspect-square bg-white rounded-2xl overflow-hidden shadow-sm max-w-[500px] mx-auto">
                {product.image_url ? (
                  <img
                    src={product.image_url}
                    alt={product.name}
                    className="w-full h-full object-cover"
                    onError={(e) => {
                      e.target.style.display = 'none';

    // ========================================
    // 12. Page: Cart
    // ========================================
    function CartPage() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const { isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const { addToast } = useToast();

      const fetchCart = async () => {
        try {
          const res = await apiFetch('/cart');
          if (res.success) setItems(res.data);
        } catch {
          addToast('장바구니를 불러오지 못했습니다', 'error');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        if (!isLoggedIn) { navigate('/login'); return; }
        fetchCart();
      }, [isLoggedIn]);

      const updateQuantity = async (id, quantity) => {
        if (quantity < 1) return;
        try {
          const res = await apiFetch(`/cart/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ quantity }),
          });
          if (res.success) {
            setItems(res.data);
            window.dispatchEvent(new Event('cart-updated'));
          }
        } catch {
          addToast('수량 변경에 실패했습니다', 'error');
        }
      };

      const removeItem = async (id) => {
        try {
          const res = await apiFetch(`/cart/${id}`, { method: 'DELETE' });
          if (res.success) {
            setItems(res.data);
            window.dispatchEvent(new Event('cart-updated'));
            addToast('상품을 삭제했습니다', 'info');
          }
        } catch {
          addToast('삭제에 실패했습니다', 'error');
        }
      };

      const totalAmount = items.reduce((sum, item) => sum + item.price * item.quantity, 0);

      if (loading) {
        return (
          <div className="max-w-3xl mx-auto px-4 py-8 flex justify-center">
            <Spinner size="lg" />
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-6 pb-28">
          <h1 className="text-xl font-bold text-brown-dark mb-6">장바구니</h1>

          {items.length === 0 ? (
            <div>
              <EmptyState
                icon="🛒"
                title="장바구니가 비어있습니다"
                description="마음에 드는 상품을 담아보세요"
              />
              <div className="text-center mt-4">
                <Button variant="secondary" onClick={() => navigate('/')}>쇼핑하러 가기</Button>
              </div>
            </div>
          ) : (
            <>
              <div className="flex flex-col gap-3">
                {items.map(item => (
                  <Card key={item.id} className="p-4">
                    <div className="flex items-center gap-4">
                      {/* Product Image */}
                      <div
                        className="w-16 h-16 flex-shrink-0 rounded-lg overflow-hidden bg-cream cursor-pointer"
                        onClick={() => navigate(`/product/${item.product_id}`)}
                      >
                        {item.image_url ? (
                          <img
                            src={item.image_url}
                            alt={item.name}
                            className="w-full h-full object-cover"
                            onError={(e) => {
                              e.target.style.display = 'none';
                              e.target.nextSibling && (e.target.nextSibling.style.display = 'flex');
                            }}
                          />
                        ) : null}
                        <div className={`w-full h-full ${item.image_url ? 'hidden' : 'flex'} items-center justify-center text-2xl`}>
                          🍳
                        </div>
                      </div>

                      {/* Product Info */}
                      <div className="flex-grow min-w-0">
                        <h3
                          className="text-sm font-semibold text-brown-dark truncate cursor-pointer hover:text-wood-dark transition-colors"
                          onClick={() => navigate(`/product/${item.product_id}`)}
                        >
                          {item.name}
                        </h3>
                        <p className="text-sm font-bold text-wood-dark mt-0.5">{formatPrice(item.price)}</p>
                      </div>

                      {/* Quantity Controls */}
                      <div className="flex items-center gap-2 flex-shrink-0">
                        <button
                          onClick={() => updateQuantity(item.id, item.quantity - 1)}
                          disabled={item.quantity <= 1}
                          className="w-7 h-7 flex items-center justify-center rounded-full border border-gray-300 text-brown-sub hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors text-sm"
                        >
                          -
                        </button>
                        <span className="text-sm font-medium text-brown-dark w-6 text-center">{item.quantity}</span>
                        <button
                          onClick={() => updateQuantity(item.id, item.quantity + 1)}
                          className="w-7 h-7 flex items-center justify-center rounded-full border border-gray-300 text-brown-sub hover:bg-gray-50 transition-colors text-sm"
                        >
                          +
                        </button>
                      </div>

                      {/* Delete Button */}
                      <button
                        onClick={() => removeItem(item.id)}
                        className="flex-shrink-0 p-1 text-brown-sub/50 hover:text-red-500 transition-colors"
                        aria-label="삭제"
                      >
                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      </button>
                    </div>

                    {/* Item subtotal */}
                    <div className="mt-2 pt-2 border-t border-gray-100 text-right">
                      <span className="text-xs text-brown-sub">소계: </span>
                      <span className="text-sm font-bold text-brown-dark">{formatPrice(item.price * item.quantity)}</span>
                    </div>
                  </Card>
                ))}
              </div>

              {/* Bottom Fixed Bar */}
              <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-30">
                <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
                  <div>
                    <span className="text-sm text-brown-sub">총 {items.length}개 상품</span>
                    <p className="text-lg font-bold text-brown-dark">{formatPrice(totalAmount)}</p>
                  </div>
                  <Button size="lg" className="px-8" onClick={() => navigate('/checkout')}>
                    주문하기
                  </Button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ========================================
    // 13. Page: Checkout
    // ========================================
    function CheckoutPage() {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [shippingName, setShippingName] = useState('');
      const [shippingPhone, setShippingPhone] = useState('');
      const [shippingAddress, setShippingAddress] = useState('');
      const [paymentReady, setPaymentReady] = useState(false);
      const [processing, setProcessing] = useState(false);
      const paymentWidgetRef = useRef(null);
      const { isLoggedIn, user } = useAuth();
      const { navigate } = useRouter();
      const { addToast } = useToast();

      const totalAmount = items.reduce((sum, item) => sum + item.price * item.quantity, 0);

      useEffect(() => {
        if (!isLoggedIn) { navigate('/login'); return; }
        apiFetch('/cart').then(res => {
          if (res.success && res.data.length > 0) {
            setItems(res.data);
          } else {
            navigate('/cart');
          }
          setLoading(false);
        }).catch(() => {
          addToast('장바구니를 불러오지 못했습니다', 'error');
          navigate('/cart');
        });
      }, [isLoggedIn]);

      // Pre-fill shipping name from user
      useEffect(() => {
        if (user?.name && !shippingName) {
          setShippingName(user.name);
        }
      }, [user]);

      // Initialize TossPayments widget (V1 SDK)
      useEffect(() => {
        if (items.length === 0 || totalAmount === 0) return;

        const clientKey = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';
        const customerKey = `customer_${user.id}`;

        try {
          const widget = PaymentWidget(clientKey, customerKey);

          const paymentMethods = widget.renderPaymentMethods(
            '#payment-method',
            { value: totalAmount },
            { variantKey: 'DEFAULT' }
          );

          widget.renderAgreement('#agreement', { variantKey: 'AGREEMENT' });

          paymentMethods.on('ready', () => {
            paymentWidgetRef.current = widget;
            setPaymentReady(true);
          });
        } catch (err) {
          console.error('TossPayments widget init error:', err);
          addToast('결제 위젯 로드에 실패했습니다', 'error');
        }
      }, [items]);

      const handlePayment = async () => {
        if (!shippingName || !shippingPhone || !shippingAddress) {
          addToast('배송 정보를 모두 입력해주세요', 'error');
          return;
        }
        if (!paymentWidgetRef.current) {
          addToast('결제 위젯이 준비되지 않았습니다', 'error');
          return;
        }

        setProcessing(true);
        const tossOrderId = `order_${Date.now()}_${user.id}`;

        try {
          // First create order on server
          const orderRes = await apiFetch('/orders', {
            method: 'POST',
            body: JSON.stringify({
              shipping_name: shippingName,
              shipping_phone: shippingPhone,
              shipping_address: shippingAddress,
              toss_order_id: tossOrderId,
            }),
          });

          if (!orderRes.success) {
            addToast(orderRes.message || '주문 생성에 실패했습니다', 'error');
            setProcessing(false);
            return;
          }

          // Then request payment via TossPayments widget
          await paymentWidgetRef.current.requestPayment({
            orderId: tossOrderId,
            orderName: items.length === 1 ? items[0].name : `${items[0].name} 외 ${items.length - 1}건`,
            successUrl: `${window.location.origin}${window.location.pathname}#/order-complete`,
            failUrl: `${window.location.origin}${window.location.pathname}#/checkout`,
            customerEmail: user.email,
            customerName: shippingName,
          });
        } catch (err) {
          console.error('Payment error:', err);
          addToast('결제 요청에 실패했습니다', 'error');
          setProcessing(false);
        }
      };

      if (loading) {
        return (
          <div className="max-w-3xl mx-auto px-4 py-8 flex justify-center">
            <Spinner size="lg" />
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-6 pb-8">
          {/* Back Button */}
          <button
            onClick={() => navigate('/cart')}
            className="flex items-center gap-1 text-brown-sub hover:text-brown-dark transition-colors mb-4 text-sm"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            장바구니로
          </button>

          <h1 className="text-xl font-bold text-brown-dark mb-6">주문/결제</h1>

          {/* Shipping Info */}
          <Card className="p-6 mb-4">
            <h2 className="text-base font-bold text-brown-dark mb-4 flex items-center gap-2">
              <svg className="w-5 h-5 text-wood" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
              </svg>
              배송 정보
            </h2>
            <div className="flex flex-col gap-3">
              <Input
                label="받는 분"
                placeholder="이름을 입력해주세요"
                value={shippingName}
                onChange={(e) => setShippingName(e.target.value)}
              />
              <Input
                label="연락처"
                placeholder="010-0000-0000"
                value={shippingPhone}
                onChange={(e) => setShippingPhone(e.target.value)}

          {/* Order Summary */}
          <Card className="p-6 mb-4">

              <svg className="w-5 h-5 text-wood" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />

            <h2 className="text-base font-bold text-brown-dark mb-4 flex items-center gap-2">
              <svg className="w-5 h-5 text-wood" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
              </svg>
              결제 수단
            </h2>
            <div id="payment-method" className="mb-2"></div>
            <div id="agreement"></div>
            {!paymentReady && (
              <div className="flex items-center justify-center py-8">
                <Spinner size="md" />
                <span className="ml-3 text-sm text-brown-sub">결제 위젯 로드 중...</span>
              </div>
            )}
          </Card>

          {/* Payment Button */}
          <Button
            size="lg"
            className="w-full text-base py-4"
            onClick={handlePayment}
            disabled={processing || !paymentReady}
          >
            {processing ? (
              <span className="flex items-center gap-2">
                <Spinner size="sm" className="border-white/30 border-t-white" />
                결제 진행 중...
              </span>
            ) : (
              `${formatPrice(totalAmount)} 결제하기`
            )}
          </Button>
        </div>
      );
    }

    // ========================================
    // 14. Page: Order Complete
    // ========================================
    function OrderCompletePage() {
      const [status, setStatus] = useState('processing');
      const [orderInfo, setOrderInfo] = useState(null);
      const { isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const { addToast } = useToast();

      useEffect(() => {
        if (!isLoggedIn) { navigate('/login'); return; }

        const urlParams = new URLSearchParams(window.location.search);
        const paymentKey = urlParams.get('paymentKey');
        const orderId = urlParams.get('orderId');
        const amount = urlParams.get('amount');

        if (!paymentKey || !orderId || !amount) {
          setStatus('fail');
          return;
        }

        apiFetch('/payments/confirm', {
          method: 'POST',
          body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
        }).then(res => {
          if (res.success) {
            setStatus('success');
            setOrderInfo(res.data);
            window.dispatchEvent(new Event('cart-updated'));
            window.history.replaceState({}, '', window.location.pathname + '#/order-complete');
          } else {
            setStatus('fail');
            addToast(res.message || '결제 확인에 실패했습니다', 'error');
          }
        }).catch(() => {
          setStatus('fail');
        });
      }, [isLoggedIn]);

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          {status === 'processing' && (
            <div className="flex flex-col items-center justify-center py-16 text-center">
              <Spinner size="lg" />
              <p className="mt-4 text-base font-medium text-brown-dark">결제 확인 중...</p>
              <p className="mt-1 text-sm text-brown-sub">잠시만 기다려주세요</p>
            </div>
          )}

          {status === 'success' && (
            <Card className="p-8 text-center">
              <div className="w-16 h-16 mx-auto mb-4 bg-green-100 rounded-full flex items-center justify-center">
                <svg className="w-8 h-8 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
                </svg>
              </div>
              <h1 className="text-xl font-bold text-brown-dark mb-2">주문이 완료되었습니다!</h1>
              <p className="text-sm text-brown-sub mb-6">감사합니다. 주문하신 상품을 빠르게 배송해드리겠습니다.</p>

              {orderInfo && (
                <div className="bg-cream rounded-lg p-4 mb-6 text-left">
                  {orderInfo.order_id && (
                    <div className="flex justify-between text-sm py-1">
                      <span className="text-brown-sub">주문번호</span>
                      <span className="font-medium text-brown-dark">{orderInfo.order_id}</span>
                    </div>
                  )}
                  {orderInfo.total_amount != null && (
                    <div className="flex justify-between text-sm py-1">
                      <span className="text-brown-sub">결제금액</span>
                      <span className="font-bold text-wood-dark">{formatPrice(orderInfo.total_amount)}</span>
                    </div>
                  )}
                  {orderInfo.payment_method && (
                    <div className="flex justify-between text-sm py-1">
                      <span className="text-brown-sub">결제수단</span>
                      <span className="font-medium text-brown-dark">{orderInfo.payment_method}</span>
                    </div>
                  )}
                </div>
              )}

              <div className="flex flex-col sm:flex-row gap-3">
                <Button variant="primary" className="flex-1" onClick={() => navigate('/orders')}>
                  주문내역 보기
                </Button>
                <Button variant="secondary" className="flex-1" onClick={() => navigate('/')}>
                  쇼핑 계속하기
                </Button>
              </div>
            </Card>
          )}

          {status === 'fail' && (
            <Card className="p-8 text-center">
              <div className="w-16 h-16 mx-auto mb-4 bg-red-100 rounded-full flex items-center justify-center">
                <svg className="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </div>
              <h1 className="text-xl font-bold text-brown-dark mb-2">결제에 실패했습니다</h1>
              <p className="text-sm text-brown-sub mb-6">결제 과정에서 문제가 발생했습니다. 다시 시도해주세요.</p>

              <div className="flex flex-col sm:flex-row gap-3">
                <Button variant="primary" className="flex-1" onClick={() => navigate('/checkout')}>
                  다시 시도하기
                </Button>
                <Button variant="secondary" className="flex-1" onClick={() => navigate('/')}>
                  홈으로 돌아가기
                </Button>
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // 15. Page: Orders (Order History)
    // ========================================
    function OrdersPage() {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [expandedId, setExpandedId] = useState(null);
      const { isLoggedIn } = useAuth();
      const { navigate } = useRouter();

      useEffect(() => {
        if (!isLoggedIn) { navigate('/login'); return; }
        apiFetch('/orders').then(res => {
          if (res.success) setOrders(res.data);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [isLoggedIn]);

      const toggleExpand = (id) => {
        setExpandedId(prev => prev === id ? null : id);
      };

      const getStatusBadge = (status) => {
        const map = {
          pending: { label: '결제대기', bg: 'bg-yellow-100', text: 'text-yellow-700' },
          paid: { label: '결제완료', bg: 'bg-green-100', text: 'text-green-700' },
          cancelled: { label: '취소됨', bg: 'bg-red-100', text: 'text-red-700' },
        };
        const s = map[status] || map.pending;
        return (
          <span className={`inline-block px-2.5 py-0.5 text-xs font-medium rounded-full ${s.bg} ${s.text}`}>
            {s.label}
          </span>
        );
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      if (loading) {
        return (
          <div className="max-w-3xl mx-auto px-4 py-8 flex justify-center">
            <Spinner size="lg" />
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto px-4 py-6">
          <h1 className="text-xl font-bold text-brown-dark mb-6">주문내역</h1>

          {orders.length === 0 ? (
            <div>
              <EmptyState
                icon="📦"
                title="주문내역이 없습니다"
                description="첫 주문을 해보세요!"
              />
              <div className="text-center mt-4">
                <Button variant="secondary" onClick={() => navigate('/')}>쇼핑하러 가기</Button>
              </div>
            </div>
          ) : (
            <div className="flex flex-col gap-4">
              {orders.map(order => (
                <Card key={order.id} className="overflow-visible">
                  {/* Order Header - Clickable to expand */}
                  <button
                    onClick={() => toggleExpand(order.id)}
                    className="w-full p-4 text-left flex items-center justify-between hover:bg-gray-50 transition-colors"
                  >
                    <div className="flex-grow min-w-0">
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        {getStatusBadge(order.status)}
                        <span className="text-xs text-brown-sub">{formatDate(order.created_at)}</span>
                      </div>
                      <p className="text-sm font-semibold text-brown-dark truncate">
                        {order.order_name || `주문 #${order.id}`}
                      </p>
                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0 ml-4">
                      <span className="text-sm font-bold text-wood-dark">{formatPrice(order.total_amount)}</span>
                      <svg
                        className={`w-4 h-4 text-brown-sub transition-transform duration-200 ${expandedId === order.id ? 'rotate-180' : ''}`}
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}
                      >
                        <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
                      </svg>
                    </div>
                  </button>

                  {/* Expanded Order Items */}
                  {expandedId === order.id && order.items && (
                    <div className="border-t border-gray-100 px-4 pb-4">
                      <div className="flex flex-col gap-2 mt-3">
                        {order.items.map((item, idx) => (
                          <div key={idx} className="flex items-center gap-3">
                            <div className="w-10 h-10 flex-shrink-0 rounded-lg overflow-hidden bg-cream">
                              {item.image_url ? (
                                <img src={item.image_url} alt={item.name} className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'flex'); }} />
                              ) : null}
                              <div className={`w-full h-full ${item.image_url ? 'hidden' : 'flex'} items-center justify-center text-sm`}>🍳</div>
                            </div>
                            <div className="flex-grow min-w-0">
                              <p className="text-sm text-brown-dark truncate">{item.name}</p>
                              <p className="text-xs text-brown-sub">{formatPrice(item.price)} x {item.quantity}</p>
                            </div>
                            <p className="text-sm font-medium text-brown-dark flex-shrink-0">{formatPrice(item.price * item.quantity)}</p>
                          </div>
                        ))}
                      </div>

                      {/* Shipping info if available */}
                      {order.shipping_address && (
                        <div className="mt-3 pt-3 border-t border-gray-100">
                          <p className="text-xs text-brown-sub">배송지: {order.shipping_address}</p>
                          {order.shipping_name && <p className="text-xs text-brown-sub">받는 분: {order.shipping_name} {order.shipping_phone || ''}</p>}
                        </div>
                      )}
                    </div>
                  )}
                </Card>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 16. App Component
    // ========================================
    function App() {
      return (
        <Router>
          <AuthProvider>
            <ToastProvider>
              <div className="min-h-screen bg-cream">
                <Header />
                <main>
                  <Routes>
                    <Route path="/" element={<HomePage />} />
                    <Route path="/product/:id" element={<ProductDetailPage />} />
                    <Route path="/cart" element={<CartPage />} />
                    <Route path="/checkout" element={<CheckoutPage />} />
                    <Route path="/order-complete" element={<OrderCompletePage />} />
                    <Route path="/orders" element={<OrdersPage />} />
                    <Route path="/login" element={<LoginPage />} />
                    <Route path="/register" element={<RegisterPage />} />
                  </Routes>
                </main>
              </div>
            </ToastProvider>
          </AuthProvider>
        </Router>
      );
    }

    // ========================================
    // 17. Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

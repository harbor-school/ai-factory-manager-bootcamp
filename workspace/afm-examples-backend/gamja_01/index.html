<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>당근마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            carrot: '#FF6F0F',
            'carrot-light': '#FFF5EF',
            'carrot-dark': '#E55A00',
            'bg-primary': '#F8F8F8',
            'text-primary': '#212121',
            'text-secondary': '#868B94',
            'text-tertiary': '#AAAAAA',
            'border-color': '#EEEEEE',
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #F8F8F8; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, textarea, select, button { font-family: inherit; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
    .toast-in { animation: toastIn 0.3s ease-out; }
    .toast-out { animation: toastOut 0.3s ease-in forwards; }
    @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .heart-pop { animation: heartPop 0.3s ease-out; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useRef, useCallback, useMemo } = React;

    // ========================================
    // Constants & Config
    // ========================================
    const API_BASE_URL = '/api';

    const CATEGORIES = [
      '디지털기기', '생활가전', '가구/인테리어', '유아동', '생활/가공식품',
      '스포츠/레저', '여성의류', '남성의류', '게임/취미', '뷰티/미용'
    ];

    const STATUS_LABELS = {
      '판매중': { bg: 'bg-green-100', text: 'text-green-700', label: '판매중' },
      '예약중': { bg: 'bg-yellow-100', text: 'text-yellow-700', label: '예약중' },
      '거래완료': { bg: 'bg-gray-200', text: 'text-gray-600', label: '거래완료' },
    };

    // ========================================
    // Utility Functions
    // ========================================
    function getToken() {
      return localStorage.getItem('token');
    }

    function getUser() {
      try {
        const u = localStorage.getItem('user');
        return u ? JSON.parse(u) : null;
      } catch { return null; }
    }

    function setAuth(token, user) {
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(user));
    }

    function clearAuth() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
    }

    function formatPrice(price) {
      if (price === 0 || price === '0' || price === null || price === undefined) return '나눔\u{1F9E1}';
      return Number(price).toLocaleString('ko-KR') + '원';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const date = new Date(dateStr);
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      if (diffSec < 60) return '방금 전';
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin}분 전`;
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return `${diffHour}시간 전`;
      const diffDay = Math.floor(diffHour / 24);
      if (diffDay < 30) return `${diffDay}일 전`;
      const diffMonth = Math.floor(diffDay / 30);
      if (diffMonth < 12) return `${diffMonth}개월 전`;
      return `${Math.floor(diffMonth / 12)}년 전`;
    }

    async function apiFetch(endpoint, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE_URL}${endpoint}`, { ...options, headers });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        throw new Error(errBody.error || errBody.message || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // ========================================
    // Toast Context
    // ========================================
    const ToastContext = createContext();

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const idRef = useRef(0);

      const showToast = useCallback((message, type = 'error') => {
        const id = ++idRef.current;
        setToasts(prev => [...prev, { id, message, type, exiting: false }]);
        setTimeout(() => {
          setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
          }, 300);
        }, 3000);
      }, []);

      return (
        <ToastContext.Provider value={showToast}>
          {children}
          <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-2 w-[90%] max-w-[440px]">
            {toasts.map(t => (
              <div key={t.id} className={`${t.exiting ? 'toast-out' : 'toast-in'} px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium ${t.type === 'success' ? 'bg-green-500' : t.type === 'info' ? 'bg-blue-500' : 'bg-red-500'}`}>
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }

    function useToast() { return useContext(ToastContext); }

    // ========================================
    // Auth Context
    // ========================================
    const AuthContext = createContext();

    function AuthProvider({ children }) {
      const [user, setUser] = useState(getUser());
      const [token, setToken] = useState(getToken());
      const [loading, setLoading] = useState(false);

      const login = useCallback((t, u) => {
        setAuth(t, u);
        setToken(t);
        setUser(u);
      }, []);

      const logout = useCallback(() => {
        clearAuth();
        setToken(null);
        setUser(null);
        window.location.hash = '#/login';
      }, []);

      const refreshUser = useCallback(async () => {
        try {
          const data = await apiFetch('/auth/me');
          const u = data.user || data;
          localStorage.setItem('user', JSON.stringify(u));
          setUser(u);
        } catch {}
      }, []);

      const updateUser = useCallback((u) => {
        localStorage.setItem('user', JSON.stringify(u));
        setUser(u);
      }, []);

      return (
        <AuthContext.Provider value={{ user, token, login, logout, refreshUser, updateUser, isLoggedIn: !!token }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    // ========================================
    // Router
    // ========================================
    const RouterContext = createContext();

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');

      useEffect(() => {
        const handler = () => {
          const newPath = window.location.hash.slice(1) || '/';
          setPath(newPath);
          window.scrollTo(0, 0);
        };
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);

      const navigate = useCallback((to) => {
        window.location.hash = '#' + to;
      }, []);

      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function useRouter() { return useContext(RouterContext); }

    function matchRoute(pattern, path) {
      const patternParts = pattern.split('/');
      const pathParts = path.split('?')[0].split('/');
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = pathParts[i];
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    }

    function Routes({ children }) {
      const { path } = useRouter();
      const routes = React.Children.toArray(children);
      for (const route of routes) {
        const params = matchRoute(route.props.path, path);
        if (params !== null) {
          return React.cloneElement(route.props.element, { params });
        }
      }
      return routes.find(r => r.props.path === '*')?.props.element || null;
    }

    function Route({ path, element }) { return null; }

    function Link({ to, children, className, onClick }) {
      const { navigate } = useRouter();
      const handleClick = (e) => {
        e.preventDefault();
        if (onClick) onClick(e);
        navigate(to);
      };
      return <a href={'#' + to} className={className} onClick={handleClick}>{children}</a>;
    }

    // ========================================
    // SVG Icons
    // ========================================
    function IconHome({ active }) {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? '#FF6F0F' : '#868B94'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" />
        </svg>
      );
    }

    function IconSearch({ active }) {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? '#FF6F0F' : '#868B94'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.35-4.35" />
        </svg>
      );
    }

    function IconPlus({ active, color }) {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={color || (active ? '#FF6F0F' : '#868B94')} strokeWidth="2.5" strokeLinecap="round">
          <path d="M12 5v14M5 12h14" />
        </svg>
      );
    }

    function IconChat({ active }) {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? '#FF6F0F' : '#868B94'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
      );
    }

    function IconPerson({ active }) {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={active ? '#FF6F0F' : '#868B94'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" /><circle cx="12" cy="7" r="4" />
        </svg>
      );
    }

    function IconCamera() {
      return (
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#AAAAAA" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" /><circle cx="12" cy="13" r="4" />
        </svg>
      );
    }

    function IconHeart({ filled }) {
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill={filled ? '#FF6F0F' : 'none'} stroke={filled ? '#FF6F0F' : '#AAAAAA'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
        </svg>
      );
    }

    function IconEye() {
      return (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#AAAAAA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" />
        </svg>
      );
    }

    function IconBack() {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#212121" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
      );
    }

    function IconLocation() {
      return (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#868B94" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" /><circle cx="12" cy="10" r="3" />
        </svg>
      );
    }

    function IconChevronDown() {
      return (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 9l6 6 6-6" />
        </svg>
      );
    }

    function IconTrash() {
      return (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
        </svg>
      );
    }

    function IconEdit() {
      return (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
      );
    }

    function IconX() {
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      );
    }

    function IconSend() {
      return (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      );
    }

    function IconHeartSmall() {
      return (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#AAAAAA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
        </svg>
      );
    }

    // ========================================
    // Design System Components
    // ========================================
    function Spinner({ size = 'md', className = '' }) {
      const sizes = { sm: 'w-4 h-4', md: 'w-8 h-8', lg: 'w-12 h-12' };
      return (
        <div className={`${sizes[size]} border-3 border-gray-200 border-t-carrot rounded-full spinner ${className}`}
          style={{ borderWidth: size === 'sm' ? '2px' : '3px' }} />
      );
    }

    function LoadingScreen() {
      return (
        <div className="flex items-center justify-center min-h-[60vh]">
          <div className="flex flex-col items-center gap-3">
            <Spinner size="lg" />
            <span className="text-text-secondary text-sm">불러오는 중...</span>
          </div>
        </div>
      );
    }

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, children, className = '', type = 'button', fullWidth = false }) {
      const variants = {
        primary: 'bg-carrot text-white hover:bg-carrot-dark active:bg-carrot-dark disabled:bg-orange-200',
        secondary: 'bg-white text-text-primary border border-border-color hover:bg-gray-50 active:bg-gray-100',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:bg-red-700',
        ghost: 'bg-transparent text-text-secondary hover:bg-gray-100 active:bg-gray-200',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-xs rounded-lg',
        md: 'px-4 py-2.5 text-sm rounded-xl',
        lg: 'px-6 py-3.5 text-base rounded-xl',
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`font-semibold transition-all duration-150 ${variants[variant]} ${sizes[size]} ${fullWidth ? 'w-full' : ''} ${disabled ? 'cursor-not-allowed opacity-60' : 'cursor-pointer'} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ label, type = 'text', value, onChange, placeholder, error, disabled, className = '', ...rest }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && <label className="text-sm font-medium text-text-primary">{label}</label>}
          <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
            className={`w-full px-4 py-3 rounded-xl border ${error ? 'border-red-400 bg-red-50' : 'border-border-color bg-white'} text-text-primary text-sm placeholder-text-tertiary outline-none focus:border-carrot focus:ring-1 focus:ring-carrot/30 transition-colors disabled:bg-gray-100 disabled:text-text-secondary`}
            {...rest} />
          {error && <span className="text-red-500 text-xs">{error}</span>}
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, error, disabled, rows = 5, className = '' }) {
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && <label className="text-sm font-medium text-text-primary">{label}</label>}
          <textarea value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} rows={rows}
            className={`w-full px-4 py-3 rounded-xl border ${error ? 'border-red-400 bg-red-50' : 'border-border-color bg-white'} text-text-primary text-sm placeholder-text-tertiary outline-none focus:border-carrot focus:ring-1 focus:ring-carrot/30 transition-colors resize-none disabled:bg-gray-100`} />
          {error && <span className="text-red-500 text-xs">{error}</span>}
        </div>
      );
    }

    function Badge({ children, variant = 'default', className = '' }) {
      const variants = {
        default: 'bg-gray-100 text-text-secondary',
        orange: 'bg-carrot-light text-carrot',
        green: 'bg-green-100 text-green-700',
        yellow: 'bg-yellow-100 text-yellow-700',
        gray: 'bg-gray-200 text-gray-600',
        red: 'bg-red-100 text-red-600',
      };
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-xs', md: 'max-w-sm', lg: 'max-w-md' };
      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center sm:items-center" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40" />
          <div className={`relative ${sizes[size]} w-full bg-white rounded-t-2xl sm:rounded-2xl p-5 slide-up max-h-[80vh] overflow-y-auto`}
            onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold text-text-primary">{title}</h3>
              <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded-full transition-colors">
                <IconX />
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function EmptyState({ icon, title, description }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 px-4">
          <div className="text-4xl mb-4">{icon || '📦'}</div>
          <h3 className="text-base font-semibold text-text-primary mb-1">{title}</h3>
          {description && <p className="text-sm text-text-secondary text-center">{description}</p>}
        </div>
      );
    }

    // ========================================
    // Manner Temperature Component
    // ========================================
    function MannerTemp({ temp = 36.5, showLabel = true, size = 'md' }) {
      const t = Number(temp) || 36.5;
      const percent = Math.min(Math.max(((t - 30) / 20) * 100, 5), 100);
      let color = '#4CAF50';
      let emoji = '\uD83D\uDE0A';
      if (t < 36) { color = '#2196F3'; emoji = '\uD83D\uDE10'; }
      else if (t < 36.5) { color = '#4CAF50'; emoji = '\uD83D\uDE42'; }
      else if (t < 40) { color = '#FF9800'; emoji = '\uD83D\uDE0A'; }
      else if (t < 45) { color = '#FF6F0F'; emoji = '\uD83D\uDE04'; }
      else { color = '#F44336'; emoji = '\uD83E\uDD29'; }

      const h = size === 'sm' ? 'h-2' : 'h-3';

      return (
        <div className="flex flex-col gap-1">
          {showLabel && (
            <div className="flex items-center justify-between">
              <span className="text-xs text-text-secondary">매너온도</span>
              <span className="flex items-center gap-1">
                <span className="text-sm font-bold" style={{ color }}>{t.toFixed(1)}&deg;C</span>
                <span className="text-sm">{emoji}</span>
              </span>
            </div>
          )}
          <div className={`w-full ${h} bg-gray-200 rounded-full overflow-hidden`}>
            <div className={`${h} rounded-full transition-all duration-500`}
              style={{ width: `${percent}%`, backgroundColor: color }} />
          </div>

    // ========================================
    // Image Carousel Component
    // ========================================
    function ImageCarousel({ images = [] }) {
      const [current, setCurrent] = useState(0);
      const touchStart = useRef(0);
      const touchEnd = useRef(0);

      const imgs = images.length > 0 ? images : [];

      if (imgs.length === 0) {
        return (
          <div className="w-full aspect-square bg-gray-100 flex items-center justify-center">
            <div className="flex flex-col items-center gap-2 text-text-tertiary">
              <IconCamera />
              <span className="text-sm">이미지 없음</span>
            </div>
          </div>
        );
      }

      const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
      const handleTouchMove = (e) => { touchEnd.current = e.touches[0].clientX; };
      const handleTouchEnd = () => {
        const diff = touchStart.current - touchEnd.current;
        if (Math.abs(diff) > 50) {
          if (diff > 0 && current < imgs.length - 1) setCurrent(c => c + 1);
          if (diff < 0 && current > 0) setCurrent(c => c - 1);
        }
      };

      return (
        <div className="relative w-full aspect-square bg-gray-100 overflow-hidden"
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
          <div className="flex transition-transform duration-300 h-full"
            style={{ transform: `translateX(-${current * 100}%)` }}>
            {imgs.map((img, i) => (
              <img key={i} src={img} alt={`상품 이미지 ${i + 1}`}
                className="w-full h-full object-cover flex-shrink-0"
                onError={e => { e.target.style.display = 'none'; }} />
            ))}
          </div>
          {imgs.length > 1 && (
            <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5">
              {imgs.map((_, i) => (
                <button key={i} onClick={() => setCurrent(i)}
                  className={`w-2 h-2 rounded-full transition-all ${i === current ? 'bg-white w-4' : 'bg-white/50'}`} />
              ))}
            </div>
          )}
          {imgs.length > 1 && (
            <div className="absolute top-3 right-3 bg-black/40 text-white text-xs px-2 py-0.5 rounded-full">
              {current + 1}/{imgs.length}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Bottom Navigation
    // ========================================
    function BottomNav() {
      const { path, navigate } = useRouter();
      const { isLoggedIn } = useAuth();
      const showToast = useToast();
      const [unreadCount, setUnreadCount] = useState(0);

      const currentTab = useMemo(() => {
        if (path === '/' || path.startsWith('/?')) return 'home';
        if (path === '/products/new') return 'write';
        if (path === '/mypage') return 'mypage';
        if (path === '/chat' || path.startsWith('/chat/')) return 'chat';
        return 'home';
      }, [path]);

      // Poll unread chat count every 30 seconds
      useEffect(() => {
        if (!isLoggedIn) { setUnreadCount(0); return; }
        const fetchUnread = () => {
          apiFetch('/chat/unread')
            .then(data => setUnreadCount(data.unreadCount || 0))
            .catch(() => {});
        };
        fetchUnread();
        const interval = setInterval(fetchUnread, 30000);
        return () => clearInterval(interval);
      }, [isLoggedIn]);

      const tabs = [
        { id: 'home', label: '홈', icon: IconHome, to: '/' },
        { id: 'search', label: '검색', icon: IconSearch, to: null },
        { id: 'write', label: '글쓰기', icon: IconPlus, to: '/products/new' },
        { id: 'chat', label: '채팅', icon: IconChat, to: '/chat' },
        { id: 'mypage', label: '나의 당근', icon: IconPerson, to: '/mypage' },
      ];

      const handleClick = (tab) => {
        if (tab.id === 'search') {
          navigate('/');
          setTimeout(() => {
            const searchInput = document.getElementById('home-search-input');
            if (searchInput) searchInput.focus();
          }, 100);
          return;
        }
        if ((tab.id === 'write' || tab.id === 'mypage' || tab.id === 'chat') && !isLoggedIn) {
          showToast('로그인이 필요합니다', 'error');
          navigate('/login');
          return;
        }
        if (tab.to) navigate(tab.to);
      };

      // Hide on login/signup pages and in chat room pages
      if (path === '/login' || path === '/signup') return null;
      if (path.startsWith('/chat/') && path !== '/chat') return null;

      return (
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white border-t border-border-color z-40">
          <div className="flex items-center justify-around h-[56px] px-1">
            {tabs.map(tab => {
              const active = currentTab === tab.id;
              const IconComp = tab.icon;
              return (
                <button key={tab.id} onClick={() => handleClick(tab)}
                  className="flex flex-col items-center justify-center gap-0.5 flex-1 h-full relative">
                  <div className="relative">
                    <IconComp active={active} />
                    {tab.id === 'chat' && unreadCount > 0 && (
                      <span className="absolute -top-1.5 -right-2.5 min-w-[16px] h-[16px] bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center px-1">
                        {unreadCount > 99 ? '99+' : unreadCount}
                      </span>
                    )}
                  </div>
                  <span className={`text-[10px] ${active ? 'text-carrot font-semibold' : 'text-text-secondary'}`}>
                    {tab.label}
                  </span>
                </button>
              );
            })}
          </div>
          <div className="h-[env(safe-area-inset-bottom)]" />
        </nav>
      );
    }

      const [search, setSearch] = useState('');
      const [activeCategory, setActiveCategory] = useState('');
      const [radius, setRadius] = useState(5);
      const [refreshing, setRefreshing] = useState(false);
      const { user, isLoggedIn, updateUser } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();
      const categoryScrollRef = useRef(null);
      const searchTimeoutRef = useRef(null);

      const locationName = user?.location_name || '위치 설정 필요';

      // Location detection
      useEffect(() => {
        if (isLoggedIn && !user?.location_name && navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
              const { latitude, longitude } = pos.coords;
              const geoRes = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&accept-language=ko`
              );
              const geoData = await geoRes.json();
              const locName = geoData.address?.borough || geoData.address?.suburb ||
                geoData.address?.town || geoData.address?.city_district ||
                geoData.address?.city || '내 동네';
              await apiFetch('/auth/location', {
                method: 'PUT',
                body: JSON.stringify({ latitude, longitude, location_name: locName }),
              });
              updateUser({ ...user, location_name: locName, latitude, longitude });
            } catch {}
          }, () => {}, { enableHighAccuracy: false, timeout: 10000 });
        }
      }, [isLoggedIn]);

      const fetchProducts = useCallback(async (searchVal, categoryVal) => {
        try {
          const params = new URLSearchParams();
          if (searchVal) params.set('search', searchVal);
          if (categoryVal) params.set('category', categoryVal);
          if (user?.latitude && user?.longitude) {
            params.set('lat', user.latitude);
            params.set('lng', user.longitude);
            params.set('radius', radius);
          }
          const qs = params.toString();
          const data = await apiFetch(`/products${qs ? '?' + qs : ''}`);
          setProducts(Array.isArray(data) ? data : data.products || []);
        } catch (err) {
          showToast('상품을 불러오지 못했습니다');
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      }, [user, radius]);

      useEffect(() => {
        setLoading(true);
        fetchProducts(search, activeCategory);
      }, [activeCategory, radius]);

      // Debounced search
      useEffect(() => {
        if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
        searchTimeoutRef.current = setTimeout(() => {
          setLoading(true);
          fetchProducts(search, activeCategory);
        }, 400);
        return () => clearTimeout(searchTimeoutRef.current);
      }, [search]);

      const handleRefresh = () => {
        setRefreshing(true);
        fetchProducts(search, activeCategory);

        navigate(`/products/${id}`);

                    <polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
                  </svg>
                </button>
              </div>
            </div>

            {/* Search bar */}
            <div className="px-4 pb-2">
              <div className="relative">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AAAAAA" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="11" cy="11" r="7" /><path d="M21 21l-4.35-4.35" />
                </svg>
                <input id="home-search-input" type="text" value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="검색어를 입력해주세요"
                  className="w-full pl-10 pr-4 py-2.5 bg-gray-100 rounded-xl text-sm text-text-primary placeholder-text-tertiary outline-none focus:bg-gray-200 transition-colors" />
                {search && (
                  <button onClick={() => setSearch('')}
                    className="absolute right-3 top-1/2 -translate-y-1/2 p-0.5 bg-gray-300 rounded-full">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round">
                      <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>

            {/* Category chips */}

                    className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors border ${

                    }`}>

                ))}

              <div className="px-4 py-2 flex items-center gap-2 text-sm">
                <svg className="w-4 h-4 text-carrot flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>

          {loading && !refreshing ? (
            <LoadingScreen />

            <EmptyState icon="🥕" title="등록된 상품이 없어요"
              description={search ? `"${search}" 검색 결과가 없습니다` : '첫 번째 상품을 등록해보세요!'} />

          {isLoggedIn && (
            <button onClick={() => navigate('/products/new')}

              <IconPlus color="white" />
            </button>
          )}
        </div>
      );

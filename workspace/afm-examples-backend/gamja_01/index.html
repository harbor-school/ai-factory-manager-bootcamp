    // ========================================
    // Page: Product Detail
    // ========================================
    function ProductDetailPage({ params }) {
      const [product, setProduct] = useState(null);
      const [loading, setLoading] = useState(true);
      const [statusModalOpen, setStatusModalOpen] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [liked, setLiked] = useState(false);
      const [likeCount, setLikeCount] = useState(0);
      const [likeAnimating, setLikeAnimating] = useState(false);
      const [chatLoading, setChatLoading] = useState(false);
      const { user, isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();
      const productId = params?.id;

      const isOwner = user && product && (user.id === product.user_id || user.id === product.userId);

      useEffect(() => {
        if (!productId) return;
        setLoading(true);
        apiFetch(`/products/${productId}`)
          .then(data => {
            const p = data.product || data;
            setProduct(p);
            setLikeCount(p.like_count || p.likeCount || 0);
          })
          .catch(err => {
            showToast('상품을 찾을 수 없습니다');
            navigate('/');
          })
          .finally(() => setLoading(false));
      }, [productId]);

      // Check if user has liked this product
      useEffect(() => {
        if (!isLoggedIn || !productId) return;
        apiFetch('/likes')
          .then(data => {
            const ids = data.likedProductIds || [];
            setLiked(ids.includes(Number(productId)));
          })
          .catch(() => {});
      }, [isLoggedIn, productId]);

      const handleLikeToggle = async () => {
        if (!isLoggedIn) {
          showToast('로그인이 필요합니다');
          navigate('/login');
          return;
        }
        try {
          const data = await apiFetch(`/products/${productId}/like`, { method: 'POST' });
          setLiked(data.liked);
          setLikeCount(data.likeCount);
          setLikeAnimating(true);
          setTimeout(() => setLikeAnimating(false), 300);
        } catch (err) {
          showToast(err.message || '찜 처리에 실패했습니다');
        }
      };

      const handleStartChat = async () => {
        if (!isLoggedIn) {
          showToast('로그인이 필요합니다');
          navigate('/login');
          return;
        }
        setChatLoading(true);
        try {
          const sellerId = product.user_id || product.userId || product.seller?.id;
          const data = await apiFetch('/chat/rooms', {
            method: 'POST',
            body: JSON.stringify({ productId: Number(productId), sellerId }),
          });
          const room = data.room;
          navigate(`/chat/${room.id}`);
        } catch (err) {
          showToast(err.message || '채팅방을 열 수 없습니다');
        } finally {
          setChatLoading(false);
        }
      };

      const handleStatusChange = async (newStatus) => {
        try {
          await apiFetch(`/products/${productId}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status: newStatus }),
          });
          setProduct(prev => ({ ...prev, status: newStatus }));
          setStatusModalOpen(false);
          showToast('상태가 변경되었습니다', 'success');
        } catch (err) {
          showToast(err.message || '상태 변경에 실패했습니다');
        }
      };

      const handleDelete = async () => {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        setDeleting(true);
        try {
          await apiFetch(`/products/${productId}`, { method: 'DELETE' });
          showToast('상품이 삭제되었습니다', 'success');
          navigate('/');
        } catch (err) {
          showToast(err.message || '삭제에 실패했습니다');
        } finally {
          setDeleting(false);
        }
      };

      if (loading) return <LoadingScreen />;
      if (!product) return <EmptyState title="상품을 찾을 수 없습니다" />;

      const sellerNickname = product.seller?.nickname || product.nickname || product.user?.nickname || '판매자';
      const mannerTemp = product.seller?.manner_temp || product.manner_temp || product.user?.manner_temp || 36.5;
      const sellerLocation = product.seller?.location_name || product.location_name || '';
      const images = product.images || [];

      return (
        <div className="fade-in pb-[150px]">
          {/* Top bar */}
          <div className="sticky top-0 z-30 flex items-center justify-between px-2 h-[48px] bg-white/80 backdrop-blur-md border-b border-border-color">
            <button onClick={() => window.history.back()} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <IconBack />
            </button>
            {isOwner && (
              <div className="flex items-center gap-1">
                <button onClick={() => navigate(`/products/${productId}/edit`)}
                  className="p-2 hover:bg-gray-100 rounded-full transition-colors text-text-secondary">
                  <IconEdit />
                </button>
                <button onClick={handleDelete} disabled={deleting}
                  className="p-2 hover:bg-gray-100 rounded-full transition-colors text-red-500">
                  <IconTrash />
                </button>
              </div>
            )}
          </div>

          {/* Image carousel */}
          <ImageCarousel images={images} />

          {/* Seller info */}
          <div className="px-4 py-3 bg-white border-b border-border-color">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-carrot-light rounded-full flex items-center justify-center text-carrot font-bold text-sm">
                {sellerNickname.charAt(0)}
              </div>
              <div className="flex-1">
                <p className="text-sm font-semibold text-text-primary">{sellerNickname}</p>
                {sellerLocation && (
                  <p className="text-xs text-text-secondary flex items-center gap-0.5">
                    <IconLocation /> {sellerLocation}
                  </p>
                )}
              </div>
              <div className="w-24">
                <MannerTemp temp={mannerTemp} size="sm" />
              </div>
            </div>
          </div>

          {/* Product info */}
          <div className="px-4 py-4 bg-white">
            <div className="flex items-center gap-2 mb-2">
              {product.status && product.status !== '판매중' && (
                <Badge variant={product.status === '예약중' ? 'yellow' : 'gray'}>
                  {STATUS_LABELS[product.status]?.label || product.status}
                </Badge>
              )}
              {product.is_price_negotiable && (
                <Badge variant="orange">가격 제안 받기</Badge>
              )}
            </div>
            <h2 className="text-xl font-bold text-text-primary mb-1">{product.title}</h2>
            <p className="text-xs text-text-secondary mb-4">
              {product.category && <span className="underline">{product.category}</span>}
              {product.category && ' · '}{timeAgo(product.created_at)}
            </p>
            <div className="text-[15px] text-text-primary leading-relaxed whitespace-pre-wrap">
              {product.description || '상세 설명이 없습니다.'}
            </div>
            <div className="flex items-center gap-3 mt-5 pt-3 border-t border-border-color text-text-tertiary text-xs">
              <span className="flex items-center gap-1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" /></svg>
                채팅 {product.chat_count || product.chatCount || 0}
              </span>
              <span className="flex items-center gap-1">
                <IconHeartSmall />
                관심 {likeCount}
              </span>
              <span className="flex items-center gap-1">
                <IconEye />
                조회 {product.view_count || product.viewCount || 0}
              </span>
            </div>
          </div>

          {/* Bottom price bar */}
          <div className="fixed left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white border-t border-border-color z-50 px-4 py-3" style={{bottom: '72px'}}>
            <div className="flex items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <button className={`flex-shrink-0 flex flex-col items-center ${likeAnimating ? 'heart-pop' : ''}`} onClick={handleLikeToggle}>
                  <IconHeart filled={liked} />
                  {likeCount > 0 && <span className="text-[10px] text-text-tertiary mt-0.5">{likeCount}</span>}
                </button>
                <div className="h-8 w-px bg-border-color" />
                <span className="text-lg font-bold text-text-primary">{formatPrice(product.price)}</span>
              </div>
              {isOwner ? (
                <Button variant="primary" size="md" onClick={() => setStatusModalOpen(true)}>
                  상태 변경
                </Button>
              ) : (
                <Button variant="primary" size="md" onClick={handleStartChat} disabled={chatLoading}>
                  {chatLoading ? <Spinner size="sm" className="mx-auto border-white border-t-transparent" /> : '채팅하기'}
                </Button>
              )}
            </div>
          </div>

          {/* Status change modal */}
          <Modal isOpen={statusModalOpen} onClose={() => setStatusModalOpen(false)} title="거래 상태 변경">
            <div className="flex flex-col gap-2">
              {['판매중', '예약중', '거래완료'].map(status => (
                <button key={status} onClick={() => handleStatusChange(status)}
                  className={`w-full text-left px-4 py-3 rounded-xl transition-colors ${
                    product.status === status ? 'bg-carrot-light text-carrot font-semibold' : 'bg-gray-50 text-text-primary hover:bg-gray-100'
                  }`}>
                  {STATUS_LABELS[status]?.label || status}
                  {product.status === status && ' (현재)'}
                </button>
              ))}
            </div>
          </Modal>
        </div>
      );
    }

    // ========================================
    // Page: Product Create / Edit
    // ========================================
    function ProductFormPage({ params }) {
      const isEdit = params?.id != null;
      const productId = params?.id;

      // uploadedUrls: Supabase에 업로드 완료된 URL 배열 (파일 업로드)
      // urlInputs: 텍스트로 직접 입력한 URL 배열
      const [uploadedUrls, setUploadedUrls] = useState([]);
      const [urlInputs, setUrlInputs] = useState(['']);
      const [uploadingCount, setUploadingCount] = useState(0);
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('');
      const [price, setPrice] = useState('');
      const [isPriceNegotiable, setIsPriceNegotiable] = useState(false);
      const [isFree, setIsFree] = useState(false);
      const [description, setDescription] = useState('');
      const [locationName, setLocationName] = useState('');
      const [latitude, setLatitude] = useState(null);
      const [longitude, setLongitude] = useState(null);
      const [loading, setLoading] = useState(false);
      const [fetching, setFetching] = useState(isEdit);
      const [categoryOpen, setCategoryOpen] = useState(false);
      const fileInputRef = useRef(null);

      const { user, isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();

      const MAX_IMAGES = 10;

      // 전체 이미지 수 = 업로드된 URL + 유효한 직접입력 URL
      const validUrlInputs = urlInputs.filter(u => u.trim());
      const totalImageCount = uploadedUrls.length + validUrlInputs.length;

      // Redirect if not logged in
      useEffect(() => {
        if (!isLoggedIn) {
          showToast('로그인이 필요합니다');
          navigate('/login');
        }
      }, [isLoggedIn]);

      // Load existing product data for edit
      useEffect(() => {
        if (isEdit && productId) {
          apiFetch(`/products/${productId}`)
            .then(data => {
              const p = data.product || data;
              setTitle(p.title || '');
              setCategory(p.category || '');
              setPrice(p.price === 0 ? '' : String(p.price || ''));
              setIsFree(p.price === 0);
              setIsPriceNegotiable(p.is_price_negotiable || false);
              setDescription(p.description || '');
              setLocationName(p.location_name || '');
              setLatitude(p.latitude || null);
              setLongitude(p.longitude || null);
              // 기존 이미지: Supabase URL이면 uploadedUrls, 아니면 urlInputs
              const existingImgs = p.images && p.images.length > 0 ? p.images : [];
              const supabaseImgs = existingImgs.filter(url => url.includes('supabase.co'));
              const otherImgs = existingImgs.filter(url => !url.includes('supabase.co'));
              setUploadedUrls(supabaseImgs);
              setUrlInputs(otherImgs.length > 0 ? otherImgs : ['']);
            })
            .catch(() => {
              showToast('상품 정보를 불러올 수 없습니다');
              navigate('/');
            })
            .finally(() => setFetching(false));
        }
      }, [isEdit, productId]);

      // Auto-detect location
      useEffect(() => {
        if (user?.location_name) {
          setLocationName(user.location_name);
          setLatitude(user.latitude);
          setLongitude(user.longitude);
        } else if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
              const { latitude: lat, longitude: lng } = pos.coords;
              setLatitude(lat);
              setLongitude(lng);
              const geoRes = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`
              );
              const geoData = await geoRes.json();
              const locName = geoData.address?.borough || geoData.address?.suburb ||
                geoData.address?.town || geoData.address?.city_district ||
                geoData.address?.city || '내 동네';
              setLocationName(locName);
            } catch {}
          });
        }
      }, [user]);

      // 파일 선택 시 즉시 업로드
      const handleFileSelect = async (e) => {
        const files = Array.from(e.target.files || []);
        e.target.value = '';
        if (!files.length) return;

        const remaining = MAX_IMAGES - uploadedUrls.length - validUrlInputs.length;
        if (remaining <= 0) {
          showToast(`사진은 최대 ${MAX_IMAGES}장까지 가능합니다`, 'info');
          return;
        }
        const filesToUpload = files.slice(0, remaining);

        for (const file of filesToUpload) {
          setUploadingCount(c => c + 1);
          try {
            // browser-image-compression으로 압축
            const compressed = await imageCompression(file, {
              maxWidthOrHeight: 800,
              useWebWorker: true,
              fileType: 'image/jpeg',
              initialQuality: 0.7,
            });
            // base64 data URL로 변환
            const dataUrl = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = e => resolve(e.target.result);
              reader.onerror = reject;
              reader.readAsDataURL(compressed);
            });
            // 서버 업로드
            const res = await apiFetch('/upload', {
              method: 'POST',
              body: JSON.stringify({ image: dataUrl }),
            });
            setUploadedUrls(prev => [...prev, res.data.url]);
          } catch (err) {
            console.error('Upload error:', err);
            showToast('이미지 업로드에 실패했습니다', 'error');
          } finally {
            setUploadingCount(c => c - 1);
          }
        }
      };

      // 드래그 앤 드롭
      const handleDrop = (e) => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        if (files.length) {
          const dt = new DataTransfer();
          files.forEach(f => dt.items.add(f));
          const input = fileInputRef.current;
          if (input) {
            Object.defineProperty(input, 'files', { value: dt.files, writable: false });
            handleFileSelect({ target: input, preventDefault: () => {} });
          }
        }
      };

      // 업로드된 이미지 삭제
      const removeUploadedUrl = (idx) => {
        setUploadedUrls(prev => prev.filter((_, i) => i !== idx));
      };

      // URL 직접 입력 핸들러
      const handleUrlInputChange = (index, value) => {
        const newInputs = [...urlInputs];
        newInputs[index] = value;
        setUrlInputs(newInputs);
      };

      const addUrlField = () => {
        if (totalImageCount >= MAX_IMAGES) {
          showToast(`이미지는 최대 ${MAX_IMAGES}개까지 등록 가능합니다`, 'info');
          return;
        }
        setUrlInputs([...urlInputs, '']);
      };

      const removeUrlField = (index) => {
        if (urlInputs.length <= 1) { setUrlInputs(['']); return; }
        setUrlInputs(urlInputs.filter((_, i) => i !== index));
      };

      const handleFreeToggle = (checked) => {
        setIsFree(checked);
        if (checked) setPrice('');
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title.trim()) { showToast('제목을 입력해주세요'); return; }
        if (!category) { showToast('카테고리를 선택해주세요'); return; }
        if (!isFree && !price) { showToast('가격을 입력해주세요'); return; }
        if (uploadingCount > 0) { showToast('이미지 업로드 중입니다. 잠시 기다려주세요', 'info'); return; }

        // 업로드된 URL + 유효한 직접입력 URL 합치기
        const allImages = [...uploadedUrls, ...urlInputs.filter(u => u.trim())];

        const body = {
          title: title.trim(),
          category,
          price: isFree ? 0 : Number(price),
          price_suggestion: isPriceNegotiable,
          is_free: isFree,
          description: description.trim(),
          images: allImages,
          location_name: locationName,
          latitude,
          longitude,
        };

        setLoading(true);
        try {
          if (isEdit) {
            await apiFetch(`/products/${productId}`, {
              method: 'PUT',
              body: JSON.stringify(body),
            });
            showToast('상품이 수정되었습니다', 'success');
            navigate(`/products/${productId}`);
          } else {
            const data = await apiFetch('/products', {
              method: 'POST',
              body: JSON.stringify(body),
            });
            showToast('상품이 등록되었습니다', 'success');
            const newId = data.product?.id || data.id;
            navigate(newId ? `/products/${newId}` : '/');
          }
        } catch (err) {
          showToast(err.message || '저장에 실패했습니다');
        } finally {
          setLoading(false);
        }
      };

      if (fetching) return <LoadingScreen />;

      return (
        <div className="fade-in pb-6">
          {/* Header */}
          <div className="sticky top-0 z-30 flex items-center justify-between px-2 h-[48px] bg-white border-b border-border-color">
            <button onClick={() => window.history.back()} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <IconBack />
            </button>
            <h2 className="text-base font-bold text-text-primary">
              {isEdit ? '상품 수정' : '상품 등록'}
            </h2>
            <div className="w-10" />
          </div>

          <form onSubmit={handleSubmit} className="px-4 py-4 flex flex-col gap-4">
            {/* Images Section */}
            <div>
              <label className="text-sm font-medium text-text-primary mb-2 block">
                상품 이미지 ({totalImageCount + uploadingCount}/{MAX_IMAGES})
              </label>

              {/* 파일 업로드 영역 */}
              <div
                className="border-2 border-dashed border-border-color rounded-xl p-4 text-center bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer"
                onClick={() => fileInputRef.current?.click()}
                onDragOver={e => e.preventDefault()}
                onDrop={handleDrop}
              >
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="image/*"
                  multiple
                  className="hidden"
                  onChange={handleFileSelect}
                />
                <div className="flex flex-col items-center gap-1.5 py-2">
                  <IconCamera />
                  <p className="text-sm font-medium text-text-secondary">사진 선택 또는 드래그</p>
                  <p className="text-xs text-text-tertiary">최대 {MAX_IMAGES}장 · 자동 압축 후 업로드</p>
                </div>
              </div>

              {/* 업로드된 이미지 미리보기 */}
              {(uploadedUrls.length > 0 || uploadingCount > 0) && (
                <div className="flex gap-2 mt-3 overflow-x-auto hide-scrollbar pb-1">
                  {uploadedUrls.map((url, idx) => (
                    <div key={idx} className="relative w-20 h-20 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0">
                      <img src={url} alt="" className="w-full h-full object-cover" />
                      <button
                        type="button"
                        onClick={() => removeUploadedUrl(idx)}
                        className="absolute top-0.5 right-0.5 w-5 h-5 bg-black/60 rounded-full flex items-center justify-center hover:bg-black/80 transition-colors"
                      >
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round">
                          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                        </svg>
                      </button>
                      {idx === 0 && (
                        <div className="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-[10px] text-center py-0.5">대표</div>
                      )}
                    </div>
                  ))}
                  {/* 업로드 중 스피너 */}
                  {Array.from({ length: uploadingCount }).map((_, i) => (
                    <div key={`spin-${i}`} className="w-20 h-20 rounded-xl bg-gray-100 flex-shrink-0 flex items-center justify-center">
                      <Spinner size="sm" />
                    </div>
                  ))}
                </div>
              )}

              {/* URL 직접 입력 */}
              <div className="mt-3">
                <p className="text-xs text-text-secondary mb-1.5">또는 이미지 URL 직접 입력</p>
                <div className="flex flex-col gap-2">
                  {urlInputs.map((url, idx) => (
                    <div key={idx} className="flex items-center gap-2">
                      <input
                        type="url"
                        value={url}
                        onChange={e => handleUrlInputChange(idx, e.target.value)}
                        placeholder="https://example.com/image.jpg"
                        className="flex-1 px-3 py-2.5 rounded-xl border border-border-color bg-white text-sm text-text-primary placeholder-text-tertiary outline-none focus:border-carrot transition-colors"
                      />
                      <button type="button" onClick={() => removeUrlField(idx)}
                        className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors flex-shrink-0">
                        <IconX />
                      </button>
                    </div>
                  ))}
                </div>
                {totalImageCount < MAX_IMAGES && (
                  <button type="button" onClick={addUrlField}
                    className="mt-2 flex items-center gap-1 text-sm text-carrot font-medium hover:underline">
                    <IconPlus color="#FF6F0F" /> URL 추가
                  </button>
                )}
                {/* URL 입력 미리보기 */}
                {validUrlInputs.length > 0 && (
                  <div className="flex gap-2 mt-2 overflow-x-auto hide-scrollbar pb-1">
                    {validUrlInputs.map((url, idx) => (
                      <div key={idx} className="w-16 h-16 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                        <img src={url} alt="" className="w-full h-full object-cover"
                          onError={e => { e.target.style.display = 'none'; }} />
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Title */}
            <Input label="제목" value={title} onChange={e => setTitle(e.target.value)}
              placeholder="상품 제목을 입력하세요" />

            {/* Category */}
            <div className="flex flex-col gap-1.5">
              <label className="text-sm font-medium text-text-primary">카테고리</label>
              <div className="relative">
                <button type="button" onClick={() => setCategoryOpen(!categoryOpen)}
                  className={`w-full px-4 py-3 rounded-xl border border-border-color bg-white text-sm text-left flex items-center justify-between ${category ? 'text-text-primary' : 'text-text-tertiary'}`}>
                  {category || '카테고리를 선택하세요'}
                  <IconChevronDown />
                </button>
                {categoryOpen && (
                  <div className="absolute top-full left-0 right-0 mt-1 bg-white border border-border-color rounded-xl shadow-lg z-10 max-h-60 overflow-y-auto">
                    {CATEGORIES.map(cat => (
                      <button key={cat} type="button"
                        onClick={() => { setCategory(cat); setCategoryOpen(false); }}
                        className={`w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 transition-colors ${
                          category === cat ? 'text-carrot font-semibold bg-carrot-light' : 'text-text-primary'
                        }`}>
                        {cat}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Price */}
            <div>
              <Input label="가격" type="number" value={price}
                onChange={e => setPrice(e.target.value)}
                placeholder="가격을 입력하세요"
                disabled={isFree} />
              {price && !isFree && (
                <p className="text-xs text-text-secondary mt-1">{Number(price).toLocaleString('ko-KR')}원</p>
              )}
              <div className="flex flex-col gap-2 mt-3">
                <label className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={isPriceNegotiable} onChange={e => setIsPriceNegotiable(e.target.checked)}
                    className="w-4 h-4 accent-carrot rounded" />
                  <span className="text-sm text-text-primary">가격 제안 받기</span>
                </label>
                <label className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={isFree} onChange={e => handleFreeToggle(e.target.checked)}
                    className="w-4 h-4 accent-carrot rounded" />
                  <span className="text-sm text-text-primary">나눔 (무료 나눔)</span>
                </label>
              </div>
            </div>

            {/* Description */}
            <Textarea label="자세한 설명" value={description} onChange={e => setDescription(e.target.value)}
              placeholder="상품의 상태, 구매 시기, 사용 기간 등을 적어주세요." rows={6} />

            {/* Location */}
            <div className="flex flex-col gap-1.5">
              <label className="text-sm font-medium text-text-primary">거래 장소</label>
              <div className="flex items-center gap-2 px-4 py-3 bg-gray-50 rounded-xl">
                <IconLocation />
                <span className="text-sm text-text-primary">{locationName || '위치를 가져오는 중...'}</span>
              </div>
            </div>

            {/* Submit */}
            <Button type="submit" variant="primary" size="lg" fullWidth disabled={loading || uploadingCount > 0} className="mt-2">
              {loading ? (
                <Spinner size="sm" className="mx-auto border-white border-t-transparent" />
              ) : uploadingCount > 0 ? (
                '이미지 업로드 중...'
              ) : (
                isEdit ? '수정 완료' : '등록하기'
              )}
            </Button>
          </form>
        </div>
      );
    }

    // ========================================
    // Page: My Page
    // ========================================
    function MyPage() {
      const { user, isLoggedIn, logout, refreshUser } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [likedProducts, setLikedProducts] = useState([]);
      const [likedLoading, setLikedLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('selling');

      useEffect(() => {
        if (!isLoggedIn) {
          navigate('/login');
          return;
        }
        refreshUser();
        if (user?.id) {
          apiFetch(`/products/user/${user.id}`)
            .then(data => {
              setProducts(Array.isArray(data) ? data : data.products || []);
            })
            .catch(() => {})
            .finally(() => setLoading(false));

          // Fetch liked product IDs then fetch each product
          apiFetch('/likes')
            .then(async (data) => {
              const ids = data.likedProductIds || [];
              if (ids.length === 0) { setLikedProducts([]); setLikedLoading(false); return; }
              const productPromises = ids.map(id =>
                apiFetch(`/products/${id}`).then(d => d.product || d).catch(() => null)
              );
              const results = await Promise.all(productPromises);
              setLikedProducts(results.filter(Boolean));
            })
            .catch(() => {})
            .finally(() => setLikedLoading(false));
        } else {
          setLoading(false);
          setLikedLoading(false);
        }
      }, [isLoggedIn, user?.id]);

      if (!user) return <LoadingScreen />;

      return (
        <div className="fade-in pb-[72px]">
          {/* Header */}
          <div className="sticky top-0 z-30 flex items-center justify-between px-4 h-[52px] bg-white border-b border-border-color">
            <h2 className="text-lg font-bold text-text-primary">나의 당근</h2>
            <button onClick={() => { logout(); showToast('로그아웃 되었습니다', 'info'); }}
              className="text-sm text-text-secondary hover:text-red-500 transition-colors font-medium">
              로그아웃
            </button>
          </div>

          {/* Profile section */}
          <div className="px-4 py-5 bg-white border-b border-border-color">
            <div className="flex items-center gap-4">
              <div className="w-16 h-16 bg-carrot-light rounded-full flex items-center justify-center text-carrot font-bold text-2xl">
                {user.nickname?.charAt(0) || 'U'}
              </div>
              <div className="flex-1">
                <h3 className="text-lg font-bold text-text-primary">{user.nickname || '사용자'}</h3>
                <p className="text-sm text-text-secondary">{user.email}</p>
                {user.location_name && (
                  <p className="text-xs text-text-secondary flex items-center gap-0.5 mt-0.5">
                    <IconLocation /> {user.location_name}
                  </p>
                )}
              </div>
            </div>
            <div className="mt-4">
              <MannerTemp temp={user.manner_temp || 36.5} />
            </div>
          </div>

          {/* Tabs */}
          <div className="mt-2">
            <div className="flex bg-white border-b border-border-color">
              <button onClick={() => setActiveTab('selling')}
                className={`flex-1 py-3 text-sm font-semibold text-center transition-colors border-b-2 ${activeTab === 'selling' ? 'text-carrot border-carrot' : 'text-text-secondary border-transparent'}`}>
                판매 상품 {products.length > 0 && <span className="text-carrot">{products.length}</span>}
              </button>
              <button onClick={() => setActiveTab('liked')}
                className={`flex-1 py-3 text-sm font-semibold text-center transition-colors border-b-2 ${activeTab === 'liked' ? 'text-carrot border-carrot' : 'text-text-secondary border-transparent'}`}>
                찜한 상품 {likedProducts.length > 0 && <span className="text-carrot">{likedProducts.length}</span>}
              </button>
            </div>

            {activeTab === 'selling' && (
              <>
                {loading ? (
                  <div className="flex justify-center py-8"><Spinner /></div>
                ) : products.length === 0 ? (
                  <EmptyState icon="🛍" title="등록한 상품이 없어요"
                    description="중고 물건을 판매해보세요!" />
                ) : (
                  <div className="bg-white">
                    {products.map(p => (
                      <ProductCard key={p.id} product={p} onClick={(id) => navigate(`/products/${id}`)} />
                    ))}
                  </div>
                )}
              </>
            )}

            {activeTab === 'liked' && (
              <>
                {likedLoading ? (
                  <div className="flex justify-center py-8"><Spinner /></div>
                ) : likedProducts.length === 0 ? (
                  <EmptyState icon="🤍" title="찜한 상품이 없어요"
                    description="관심있는 상품에 하트를 눌러보세요!" />
                ) : (
                  <div className="bg-white">
                    {likedProducts.map(p => (
                      <ProductCard key={p.id} product={p} onClick={(id) => navigate(`/products/${id}`)} />
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // Page: Chat List
    // ========================================
    function ChatListPage() {
      const [rooms, setRooms] = useState([]);
      const [loading, setLoading] = useState(true);
      const { isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();

      useEffect(() => {
        if (!isLoggedIn) {
          navigate('/login');
          return;
        }
        apiFetch('/chat/rooms')
          .then(data => setRooms(data.rooms || []))
          .catch(() => showToast('채팅 목록을 불러올 수 없습니다'))
          .finally(() => setLoading(false));
      }, [isLoggedIn]);

      // Poll for room list updates every 10 seconds
      useEffect(() => {
        if (!isLoggedIn) return;
        const interval = setInterval(() => {
          apiFetch('/chat/rooms')
            .then(data => setRooms(data.rooms || []))
            .catch(() => {});
        }, 10000);
        return () => clearInterval(interval);
      }, [isLoggedIn]);

      const formatChatTime = (dateStr) => {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffDay = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        if (diffDay === 0) {
          const h = date.getHours();
          const m = String(date.getMinutes()).padStart(2, '0');
          const period = h < 12 ? '오전' : '오후';
          const hour12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
          return `${period} ${hour12}:${m}`;
        }
        if (diffDay === 1) return '어제';
        if (diffDay < 7) return `${diffDay}일 전`;
        return `${date.getMonth() + 1}/${date.getDate()}`;
      };

      return (
        <div className="fade-in pb-[72px]">
          <div className="sticky top-0 z-30 flex items-center px-4 h-[52px] bg-white border-b border-border-color">
            <h2 className="text-lg font-bold text-text-primary">채팅</h2>
          </div>

          {loading ? (
            <LoadingScreen />
          ) : rooms.length === 0 ? (
            <EmptyState icon="💬" title="아직 채팅이 없어요" description="상품 페이지에서 채팅을 시작해보세요!" />
          ) : (
            <div className="bg-white">
              {rooms.map(room => (
                <div key={room.id}
                  className="flex items-center gap-3 px-4 py-3 border-b border-border-color active:bg-gray-50 cursor-pointer transition-colors"
                  onClick={() => navigate(`/chat/${room.id}`)}>
                  {/* Product thumbnail */}
                  <div className="w-[50px] h-[50px] rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                    {room.product_image ? (
                      <img src={room.product_image} alt="" className="w-full h-full object-cover"
                        onError={e => { e.target.style.display = 'none'; }} />
                    ) : (
                      <div className="w-full h-full flex items-center justify-center text-text-tertiary text-xs">
                        <IconCamera />
                      </div>
                    )}
                  </div>
                  {/* Chat info */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-semibold text-text-primary truncate">
                        {room.other_nickname || '상대방'}
                      </span>
                      <span className="text-[11px] text-text-tertiary flex-shrink-0 ml-2">
                        {formatChatTime(room.last_message_at)}
                      </span>
                    </div>
                    <div className="flex items-center justify-between mt-0.5">
                      <p className="text-[13px] text-text-secondary truncate flex-1">
                        {room.last_message || '메시지가 없습니다'}
                      </p>
                      {room.unread_count > 0 && (
                        <span className="ml-2 flex-shrink-0 min-w-[20px] h-[20px] bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-1.5">
                          {room.unread_count > 99 ? '99+' : room.unread_count}
                        </span>
                      )}
                    </div>
                    <p className="text-[11px] text-text-tertiary truncate mt-0.5">
                      {room.product_title || ''}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page: Chat Room
    // ========================================
    function ChatRoomPage({ params }) {
      const roomId = params?.roomId;
      const [messages, setMessages] = useState([]);
      const [roomInfo, setRoomInfo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const { user, isLoggedIn } = useAuth();
      const { navigate } = useRouter();
      const showToast = useToast();
      const messagesEndRef = useRef(null);
      const messagesContainerRef = useRef(null);
      const inputRef = useRef(null);

      const scrollToBottom = useCallback((behavior = 'smooth') => {
        setTimeout(() => {
          messagesEndRef.current?.scrollIntoView({ behavior });
        }, 50);
      }, []);

      // Load initial messages and room info
      useEffect(() => {
        if (!isLoggedIn) { navigate('/login'); return; }
        if (!roomId) return;

        // Fetch room list to get room info
        apiFetch('/chat/rooms')
          .then(data => {
            const rooms = data.rooms || [];
            const room = rooms.find(r => String(r.id) === String(roomId));
            if (room) setRoomInfo(room);
          })
          .catch(() => {});

        // Fetch messages
        apiFetch(`/chat/rooms/${roomId}/messages`)
          .then(data => {
            setMessages(data.messages || []);
            scrollToBottom('instant');
          })
          .catch(() => showToast('메시지를 불러올 수 없습니다'))
          .finally(() => setLoading(false));
      }, [roomId, isLoggedIn]);

      // Poll for new messages every 3 seconds
      useEffect(() => {
        if (!isLoggedIn || !roomId) return;
        const interval = setInterval(() => {
          apiFetch(`/chat/rooms/${roomId}/messages`)
            .then(data => {
              const newMessages = data.messages || [];
              setMessages(prev => {
                if (newMessages.length !== prev.length) {
                  scrollToBottom();
                  return newMessages;
                }
                return prev;
              });
            })
            .catch(() => {});
        }, 3000);
        return () => clearInterval(interval);
      }, [roomId, isLoggedIn]);

      const formatMessageTime = (dateStr) => {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        const h = date.getHours();
        const m = String(date.getMinutes()).padStart(2, '0');
        const period = h < 12 ? '오전' : '오후';
        const hour12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
        return `${period} ${hour12}:${m}`;
      };

      const handleSend = async () => {
        const content = input.trim();
        if (!content || sending) return;

        // Optimistic update
        const tempMessage = {
          id: `temp-${Date.now()}`,
          sender_id: user.id,
          sender_nickname: user.nickname,
          content,
          created_at: new Date().toISOString(),
          is_read: false,
          _temp: true,
        };
        setMessages(prev => [...prev, tempMessage]);
        setInput('');
        scrollToBottom();
        setSending(true);

        try {
          const data = await apiFetch(`/chat/rooms/${roomId}/messages`, {
            method: 'POST',
            body: JSON.stringify({ content }),
          });
          // Replace temp message with real one
          setMessages(prev =>
            prev.map(m => m.id === tempMessage.id ? (data.message || { ...tempMessage, _temp: false }) : m)
          );
        } catch (err) {
          // Remove failed temp message
          setMessages(prev => prev.filter(m => m.id !== tempMessage.id));
          showToast('메시지 전송에 실패했습니다');
        } finally {
          setSending(false);
          inputRef.current?.focus();
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      const isMyMessage = (msg) => {
        return user && (msg.sender_id === user.id);
      };

      // Group consecutive messages by same sender for cleaner UI
      const shouldShowSender = (msg, index) => {
        if (index === 0) return true;
        return messages[index - 1].sender_id !== msg.sender_id;
      };

      const otherNickname = roomInfo?.other_nickname || '상대방';

      return (
        <div className="fade-in flex flex-col h-screen max-h-screen">
          {/* Chat header */}
          <div className="sticky top-0 z-30 flex items-center gap-2 px-2 h-[52px] bg-white border-b border-border-color flex-shrink-0">
            <button onClick={() => navigate('/chat')} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
              <IconBack />
            </button>
            <div className="flex-1 min-w-0">
              <h2 className="text-base font-bold text-text-primary truncate">{otherNickname}</h2>
              {roomInfo?.product_title && (
                <p className="text-[11px] text-text-secondary truncate">{roomInfo.product_title}</p>
              )}
            </div>
          </div>

          {/* Product info bar (optional) */}
          {roomInfo?.product_title && (
            <div className="flex items-center gap-3 px-4 py-2 bg-gray-50 border-b border-border-color flex-shrink-0 cursor-pointer"
              onClick={() => roomInfo?.product_id && navigate(`/products/${roomInfo.product_id}`)}>
              {roomInfo.product_image && (
                <div className="w-10 h-10 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                  <img src={roomInfo.product_image} alt="" className="w-full h-full object-cover"
                    onError={e => { e.target.style.display = 'none'; }} />
                </div>
              )}
              <div className="flex-1 min-w-0">
                <p className="text-xs text-text-primary font-medium truncate">{roomInfo.product_title}</p>
                {roomInfo.product_price !== undefined && (
                  <p className="text-xs text-text-secondary">{formatPrice(roomInfo.product_price)}</p>
                )}
              </div>
            </div>
          )}

          {/* Messages area */}
          <div ref={messagesContainerRef}
            className="flex-1 overflow-y-auto px-4 py-4 bg-bg-primary" style={{ minHeight: 0 }}>
            {loading ? (
              <div className="flex justify-center py-8"><Spinner /></div>
            ) : messages.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-12 text-text-secondary">
                <p className="text-sm">채팅을 시작해보세요!</p>
              </div>
            ) : (
              <div className="flex flex-col gap-1">
                {messages.map((msg, index) => {
                  const mine = isMyMessage(msg);
                  const showSender = shouldShowSender(msg, index);
                  return (
                    <div key={msg.id} className={`flex flex-col ${mine ? 'items-end' : 'items-start'} ${showSender ? 'mt-3' : 'mt-0.5'}`}>
                      {!mine && showSender && (
                        <span className="text-[11px] text-text-secondary mb-1 ml-1">
                          {msg.sender_nickname || otherNickname}
                        </span>
                      )}
                      <div className={`flex items-end gap-1.5 ${mine ? 'flex-row-reverse' : 'flex-row'}`}>
                        <div className={`max-w-[70%] px-3.5 py-2.5 text-[14px] leading-relaxed break-words ${
                          mine
                            ? 'bg-carrot text-white rounded-2xl rounded-br-md'
                            : 'bg-white text-text-primary rounded-2xl rounded-bl-md shadow-sm'
                        } ${msg._temp ? 'opacity-70' : ''}`}>
                          {msg.content}
                        </div>
                        <span className={`text-[10px] text-text-tertiary flex-shrink-0 ${mine ? 'mr-0.5' : 'ml-0.5'}`}>
                          {formatMessageTime(msg.created_at)}
                        </span>
                      </div>
                    </div>
                  );
                })}
                <div ref={messagesEndRef} />
              </div>
            )}
          </div>

          {/* Input area */}
          <div className="flex-shrink-0 bg-white border-t border-border-color px-3 py-2">
            <div className="flex items-center gap-2">
              <input
                ref={inputRef}
                type="text"
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="메시지를 입력하세요"
                className="flex-1 px-4 py-2.5 bg-gray-100 rounded-full text-sm text-text-primary placeholder-text-tertiary outline-none focus:bg-gray-200 transition-colors"
              />
              <button
                onClick={handleSend}
                disabled={!input.trim() || sending}
                className={`w-10 h-10 rounded-full flex items-center justify-center transition-colors flex-shrink-0 ${
                  input.trim() ? 'bg-carrot text-white hover:bg-carrot-dark' : 'bg-gray-200 text-text-tertiary'
                }`}>
                <IconSend />
              </button>
            </div>
            <div className="h-[env(safe-area-inset-bottom)]" />
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const { path } = useRouter();
      const isChatRoom = path.startsWith('/chat/') && path !== '/chat';

      return (
        <div className={`max-w-[480px] mx-auto min-h-screen bg-white relative shadow-lg ${isChatRoom ? 'overflow-hidden' : ''}`}>
          <Routes>
            <Route path="/login" element={<LoginPage />} />
            <Route path="/signup" element={<SignupPage />} />
            <Route path="/" element={<HomePage />} />
            <Route path="/products/new" element={<ProductFormPage />} />
            <Route path="/products/:id/edit" element={<ProductFormPage />} />
            <Route path="/products/:id" element={<ProductDetailPage />} />
            <Route path="/mypage" element={<MyPage />} />
            <Route path="/chat" element={<ChatListPage />} />
            <Route path="/chat/:roomId" element={<ChatRoomPage />} />
            <Route path="*" element={<HomePage />} />
          </Routes>
          <BottomNav />
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <Router>
        <AuthProvider>
          <ToastProvider>
            <App />
          </ToastProvider>
        </AuthProvider>
      </Router>
    );
  </script>
</body>
</html>
